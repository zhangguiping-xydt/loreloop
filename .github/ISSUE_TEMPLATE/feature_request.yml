name: Feature request
description: Propose a focused improvement to the governed knowledge loop.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or trust problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe observable behavior and how it fits Reverse, Apply, or Return.
    validations:
      required: true
  - type: textarea
    id: trust
    attributes:
      label: Trust and compatibility impact
      description: Note changes to evidence, permissions, privacy, CLI compatibility, or schemas.
    validations:
      required: true
