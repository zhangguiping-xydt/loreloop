name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  UV_VERSION: "0.9.30"

jobs:
  build:
    name: Build, verify, attest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: true
      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"
      - run: uv sync --frozen --extra dev
      - run: uv run --frozen pytest -q
      - run: uv build
      - run: uv run --frozen twine check dist/*
      - name: Prepare GitHub Runtime installer assets
        run: |
          mkdir -p release-assets
          WHEEL="$(find dist -maxdepth 1 -name 'loreloop-*-py3-none-any.whl' -print -quit)"
          test -n "$WHEEL"
          cp plugins/loreloop/scripts/install-runtime.sh release-assets/install-loreloop.sh
          cp plugins/loreloop/scripts/install-runtime.ps1 release-assets/install-loreloop.ps1
          chmod +x release-assets/install-loreloop.sh
          WHEEL_SHA="$(sha256sum "$WHEEL" | awk '{print $1}')"
          WHEEL_NAME="$(basename "$WHEEL")"
          printf '%s  %s\n' "$WHEEL_SHA" "$WHEEL_NAME" > release-assets/SHA256SUMS
          (
            cd release-assets
            sha256sum \
              install-loreloop.sh \
              install-loreloop.ps1 >> SHA256SUMS
          )
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: dist
          format: spdx-json
          output-file: release-assets/loreloop-sbom.spdx.json
          upload-artifact: false
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/*
            release-assets/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-distributions
          path: |
            dist/
            release-assets/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/loreloop/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: release
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: release/dist/

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: release
      - name: Publish tagged release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release/dist/* release/release-assets/*
          --verify-tag --generate-notes
