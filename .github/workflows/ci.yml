name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m pytest -q
      - run: python eval/run.py retrieval --output eval-retrieval.json
      - run: python -m pip wheel --no-deps . --wheel-dir dist
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: retrieval-${{ matrix.os }}-py${{ matrix.python }}
          path: eval-retrieval.json

  browser:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev,web]"
      - run: python -m playwright install --with-deps chromium
      - run: python -m pytest -q tests/test_smoke_playwright.py
